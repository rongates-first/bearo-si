baseURL = "https://bearo.si/"
languageCode = "sl-SI"
defaultContentLanguage = "sl"
title = "Bearo Casino | Bonusi, igralni avtomati in live casino"
enableRobotsTXT = true
enableGitInfo = false

# Build / output
[outputs]
home = ["HTML"]
section = ["HTML"]
page = ["HTML"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# Site-wide params consumed by templates
[params]
  description = "Odkrijte Bearo Casino s spletnimi igralnimi avtomati, live casinom, varnimi plačili in sladkimi bonusi v pisani jelly atmosferi."
  brand = "Bearo Casino"
  domain = "bearo.si"
  currency = "EUR"
  currencySymbol = "€"
  ogImage = "/img/hero-bears.jpg"
  themeColor = "#FF3D6E"

  # Visible bonus copy used across the page
  mainBonusHeadline = "200% Welcome Bonus do €7.000 + 25 brezplačnih vrtljajev + 5% cashback"
  mainBonusShort    = "200% bonus dobrodošlice do €7.000"
  secondaryBonus    = "100% do €750 + 200 FS + 1 Bonus"

  # Social
  [params.social]
    twitter = "@bearocasino"
    facebook = "bearocasino"
    instagram = "bearocasino"

